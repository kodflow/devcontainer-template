name: Tests & Coverage

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Bats
        id: setup-bats
        uses: bats-core/bats-action@77d6fb60505b4d0d1d73e48bd035b55074bbfb43 # v4.1.0

      - name: Run tests
        env:
          BATS_LIB_PATH: ${{ steps.setup-bats.outputs.lib-path }}
          TERM: xterm
        run: bats tests/**/*.bats

      - name: Build and install kcov
        id: kcov
        continue-on-error: true
        run: |
          sudo apt-get update && sudo apt-get install -y \
            binutils-dev libcurl4-openssl-dev zlib1g-dev \
            libdw-dev libiberty-dev cmake g++ python3
          cd /tmp
          git clone --depth 1 --branch v43 https://github.com/SimonKagstrom/kcov.git
          cd kcov
          mkdir build && cd build
          cmake -DCMAKE_INSTALL_PREFIX=/usr/local ..
          make -j$(nproc)
          sudo make install
          echo "installed=true" >> "$GITHUB_OUTPUT"

      - name: Collect coverage
        if: steps.kcov.outputs.installed == 'true'
        env:
          BATS_LIB_PATH: ${{ steps.setup-bats.outputs.lib-path }}
          TERM: xterm
        run: |
          kcov --exclude-path=/tmp,/usr,/home/runner \
               --include-pattern=.devcontainer/images/.claude/scripts \
               ./coverage \
               bats tests/**/*.bats
          echo "kcov exited with $?"

      - name: Upload coverage to Codacy
        if: always()
        continue-on-error: true
        run: |
          REPORT=$(find ./coverage -name 'cobertura.xml' -type f 2>/dev/null | head -1)
          if [ -n "$REPORT" ]; then
            echo "Found coverage report: $REPORT"
            bash <(curl -Ls https://coverage.codacy.com/get.sh) report \
              --project-token "${{ secrets.CODACY_PROJECT_TOKEN }}" \
              -r "$REPORT" \
              --partial || true
          else
            echo "No coverage report found, sending final signal only"
          fi
          # Always send final signal so Codacy posts the status check
          bash <(curl -Ls https://coverage.codacy.com/get.sh) final \
            --project-token "${{ secrets.CODACY_PROJECT_TOKEN }}" || true

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: coverage-report
          path: ./coverage/
          retention-days: 7
          if-no-files-found: ignore
