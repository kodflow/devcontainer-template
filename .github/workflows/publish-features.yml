name: Publish Dev Container Features

on:
  push:
    branches: [main]
    paths:
      - ".devcontainer/features/**"
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Flatten features for OCI publishing
        run: |
          mkdir -p src

          # Language features: flatten from languages/<name>/ to <name>/
          for dir in .devcontainer/features/languages/*/; do
            name=$(basename "$dir")
            [ "$name" = "shared" ] && continue
            [ ! -f "$dir/devcontainer-feature.json" ] && continue
            cp -r "$dir" "src/$name"
            # Embed shared utils so each feature is self-contained
            cp .devcontainer/features/languages/shared/feature-utils.sh "src/$name/" 2>/dev/null || true
          done

          # Non-language features: copy directly
          for dir in browser kubernetes infrastructure claude; do
            if [ -d ".devcontainer/features/$dir" ] && [ -f ".devcontainer/features/$dir/devcontainer-feature.json" ]; then
              cp -r ".devcontainer/features/$dir" "src/$dir"
              # Embed shared utils for browser feature (uses same pattern)
              cp .devcontainer/features/languages/shared/feature-utils.sh "src/$dir/" 2>/dev/null || true
            fi
          done

          echo "Features prepared for publishing:"
          ls -1 src/

      - name: Publish Dev Container Features
        uses: devcontainers/action@v1
        with:
          publish-features: true
          base-path-to-features: src
          oci-registry: ghcr.io
          features-namespace: kodflow/devcontainer-features
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
